name: Build Android APK / AAB

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. pnpm + Node ─────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ── 4. Install workspace dependencies ──────────────────────────────────
      - name: Install workspace dependencies
        run: pnpm install

      # ── 5. Prepare web dist (copy game HTML as-is) ────────────────────────
      - name: Prepare web dist
        run: |
          mkdir -p artifacts/game/dist/public
          cp artifacts/game/index.html artifacts/game/dist/public/index.html

      # ── 6. Install Capacitor in a temp dir (avoids pnpm catalog: protocol) ──
      - name: Install Capacitor
        run: |
          mkdir -p /tmp/cap-install
          cd /tmp/cap-install
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          # Copy node_modules into the game package so cap CLI can find them
          cp -r node_modules $GITHUB_WORKSPACE/artifacts/game/node_modules

      # ── 7. Add Android platform ────────────────────────────────────────────
      - name: Add Android platform
        working-directory: artifacts/game
        run: ./node_modules/.bin/cap add android

      # ── 8. Sync web content into Android project ───────────────────────────
      - name: Sync Capacitor
        working-directory: artifacts/game
        run: ./node_modules/.bin/cap sync android

      # ── 9a. Build DEBUG APK ────────────────────────────────────────────────
      - name: Build Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: artifacts/game/android
        run: ./gradlew assembleDebug --no-daemon

      # ── 9b. Configure release signing ─────────────────────────────────────
      - name: Decode keystore
        if: ${{ inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" \
            | base64 --decode > artifacts/game/android/app/release.keystore

      - name: Build Release AAB + APK
        if: ${{ inputs.build_type == 'release' }}
        working-directory: artifacts/game/android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/artifacts/game/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ── 10. Upload build artifacts ─────────────────────────────────────────
      - name: Upload Debug APK
        if: ${{ inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: artifacts/game/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Release AAB
        if: ${{ inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: artifacts/game/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Release APK
        if: ${{ inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/game/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
